<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>S01 - Đổi mật khẩu</title>
    <link rel="stylesheet" href="../styles/design-system.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Điều hướng chính">
        <div class="brand">Exam System</div>
        <ul class="nav-list">
          <li><a class="nav-link" href="#">Dashboard</a></li>
          <li><a class="nav-link active" href="#">Đổi mật khẩu</a></li>
        </ul>
      </aside>

      <div class="main">
        <header class="topbar">
          <strong>Thiết lập tài khoản</strong>
          <span class="badge badge-info">Giảng viên</span>
        </header>

        <main class="container">
          <header class="page-header">
            <div>
              <h1 class="page-title">Đổi mật khẩu</h1>
              <p class="page-subtitle">Cập nhật mật khẩu định kỳ để bảo mật tài khoản.</p>
            </div>
          </header>

          <section class="card" aria-labelledby="change-pass-title">
            <h2 id="change-pass-title" class="section-title">Thông tin bảo mật</h2>

            <form class="form-grid" action="#" method="post">
              <div class="field">
                <label for="current-password">Mật khẩu hiện tại <span class="required">*</span></label>
                <input class="input" id="current-password" name="currentPassword" type="password" autocomplete="current-password" required />
              </div>

              <div class="field">
                <label for="new-password">Mật khẩu mới <span class="required">*</span></label>
                <input class="input" id="new-password" name="newPassword" type="password" autocomplete="new-password" required />
                <p class="field-help">Ít nhất 8 ký tự, có chữ hoa, chữ thường, số và ký tự đặc biệt.</p>
              </div>

              <div class="field">
                <label for="confirm-password">Xác nhận mật khẩu mới <span class="required">*</span></label>
                <input class="input" id="confirm-password" name="confirmPassword" type="password" autocomplete="new-password" required />
                <p class="field-error">Mật khẩu xác nhận chưa khớp.</p>
              </div>

              <div class="actions">
                <button type="submit" class="btn btn-primary">Lưu mật khẩu mới</button>
                <button type="button" class="btn btn-secondary">Hủy thay đổi</button>
              </div>
            </form>
          </section>
        </main>
      </div>
    </div>
  </body>
</html>
