<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>S00 - Đăng nhập</title>
    <link rel="stylesheet" href="../styles/design-system.css" />
  </head>
  <body>
    <main class="auth-layout">
      <section class="auth-card" aria-labelledby="login-title">
        <h1 id="login-title" class="auth-title">Đăng nhập</h1>
        <p class="auth-subtitle">Đăng nhập bằng email công vụ để truy cập hệ thống.</p>

        <form class="form-grid" action="#" method="post">
          <div class="field">
            <label for="email">Email <span class="required">*</span></label>
            <input class="input" id="email" name="email" type="email" autocomplete="email" placeholder="name@university.edu.vn" required />
          </div>

          <div class="field">
            <label for="password">Mật khẩu <span class="required">*</span></label>
            <input class="input" id="password" name="password" type="password" autocomplete="current-password" placeholder="Nhập mật khẩu" required />
            <p class="field-help">Tối thiểu 8 ký tự, gồm chữ hoa, chữ thường và số.</p>
          </div>

          <div class="actions">
            <button type="submit" class="btn btn-primary">Đăng nhập</button>
            <button type="button" class="btn btn-tertiary">Quên mật khẩu?</button>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
