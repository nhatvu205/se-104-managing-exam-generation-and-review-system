<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>S02 - Trang lỗi / Không có quyền</title>
    <link rel="stylesheet" href="../styles/design-system.css" />
  </head>
  <body>
    <main class="error-layout">
      <section class="card error-card" aria-labelledby="error-title">
        <div class="error-code" aria-hidden="true">403</div>
        <h1 id="error-title" class="page-title">Bạn không có quyền truy cập</h1>
        <p class="page-subtitle mt-12">
          Tài khoản hiện tại không được cấp quyền cho trang này hoặc đường dẫn không tồn tại.
        </p>
        <div class="actions actions-center">
          <a class="btn btn-primary" href="#" role="button">Về trang chủ</a>
          <a class="btn btn-secondary" href="#" role="button">Liên hệ quản trị viên</a>
        </div>
      </section>
    </main>
  </body>
</html>
